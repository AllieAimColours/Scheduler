<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft pink → magenta background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>

    <!-- Outer petal gradient — soft blush -->
    <radialGradient id="petalOuter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="60%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </radialGradient>

    <!-- Mid petal gradient — deeper rose -->
    <radialGradient id="petalMid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="60%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </radialGradient>

    <!-- Inner petal gradient — rich magenta -->
    <radialGradient id="petalInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#be185d"/>
    </radialGradient>

    <!-- Center pollen highlight -->
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="60%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- A single peony petal: teardrop pointing up.
       The viewBox of the petal path is roughly 0..100 across, 0..130 tall,
       with the tip at (50, 0) and the base at (50, 130). -->
  <symbol id="petal" viewBox="0 0 100 130">
    <path d="M50 0
             C 75 25, 95 50, 90 85
             C 85 110, 65 125, 50 130
             C 35 125, 15 110, 10 85
             C 5 50, 25 25, 50 0 Z"
          stroke-linejoin="round"/>
  </symbol>

  <!-- ── OUTER LAYER — 8 large petals ── -->
  <g transform="translate(256 256)" filter="url(#softShadow)">
    <!-- 8 petals at 45° increments, each 200px tall -->
    <g transform="rotate(0)">   <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(45)">  <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(90)">  <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(135)"> <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(180)"> <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(225)"> <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(270)"> <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
    <g transform="rotate(315)"> <use href="#petal" x="-100" y="-220" width="200" height="260" fill="url(#petalOuter)" opacity="0.95"/></g>
  </g>

  <!-- ── MIDDLE LAYER — 8 medium petals offset by 22.5° ── -->
  <g transform="translate(256 256)">
    <g transform="rotate(22.5)">  <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(67.5)">  <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(112.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(157.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(202.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(247.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(292.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
    <g transform="rotate(337.5)"> <use href="#petal" x="-75" y="-160" width="150" height="195" fill="url(#petalMid)"/></g>
  </g>

  <!-- ── INNER LAYER — 6 small petals tightly packed ── -->
  <g transform="translate(256 256)">
    <g transform="rotate(0)">    <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
    <g transform="rotate(60)">   <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
    <g transform="rotate(120)">  <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
    <g transform="rotate(180)">  <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
    <g transform="rotate(240)">  <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
    <g transform="rotate(300)">  <use href="#petal" x="-50" y="-105" width="100" height="130" fill="url(#petalInner)"/></g>
  </g>

  <!-- ── CENTER pollen ── -->
  <circle cx="256" cy="256" r="32" fill="url(#center)"/>
  <circle cx="256" cy="256" r="14" fill="#fbbf24" opacity="0.8"/>
</svg>
