<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle inner glow circles -->
  <circle cx="120" cy="120" r="80" fill="#ffffff" opacity="0.08"/>
  <circle cx="400" cy="400" r="100" fill="#ffffff" opacity="0.06"/>

  <!-- Main sparkle (4-pointed star, lucide-style) -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <path d="M 0,-130 C 18,-50 50,-18 130,0 C 50,18 18,50 0,130 C -18,50 -50,18 -130,0 C -50,-18 -18,-50 0,-130 Z" fill="url(#sparkle)"/>
  </g>

  <!-- Small accent sparkles -->
  <g transform="translate(140, 360)">
    <path d="M 0,-32 C 4,-12 12,-4 32,0 C 12,4 4,12 0,32 C -4,12 -12,4 -32,0 C -12,-4 -4,-12 0,-32 Z" fill="#ffffff" opacity="0.85"/>
  </g>
  <g transform="translate(380, 150)">
    <path d="M 0,-22 C 3,-9 9,-3 22,0 C 9,3 3,9 0,22 C -3,9 -9,3 -22,0 C -9,-3 -3,-9 0,-22 Z" fill="#ffffff" opacity="0.75"/>
  </g>
</svg>
